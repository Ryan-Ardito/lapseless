services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: practiceatlas
      POSTGRES_USER: practiceatlas
      POSTGRES_PASSWORD: practiceatlas
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practiceatlas"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [miniodata:/data]

  minio-setup:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 2 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/practice-atlas-documents
      "

  app:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3000
    ports: ["3000:3000"]
    environment:
      NODE_ENV: development
      SERVE_STATIC: "true"
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:3000
      DATABASE_URL: postgres://practiceatlas:practiceatlas@postgres:5432/practiceatlas
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: practice-atlas-documents
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:
